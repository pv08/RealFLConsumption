services:
  fl-server:
    build: .
    image: fl-simulation-img
    container_name: fl_server
    command: python app-server.py --host 0.0.0.0 --required_clients 25 --clients_per_round
      5 --max_rounds 10
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
          - driver: nvidia
            count: 1
            capabilities:
            - gpu
    ports:
    - 65432:65432
    environment:
    - NVIDIA_VISIBLE_DEVICES=all
    - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    shm_size: 1gb
    networks:
    - fl-network
  client_8156:
    image: fl-simulation-img
    runtime: nvidia
    container_name: fl_client_8156
    depends_on:
      fl-server:
        condition: service_started
    command: python app-client.py --host fl-server --filter_bs 8156 --epochs 200 --batch_size
      128 --num_workers 0
    environment:
    - NVIDIA_VISIBLE_DEVICES=all
    - CUBLAS_WORKSPACE_CONFIG=:4096:8
    - PYTORCH_ALLOC_CONF=expandable_segments:True
    - GPU_FRACTION=0.03
    - CLIENT_ID=8156
    deploy:
      resources:
        reservations:
          devices:
          - driver: nvidia
            count: 1
            capabilities:
            - gpu
    shm_size: 1gb
    networks:
    - fl-network
