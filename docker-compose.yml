services:
  fl-server:
    build: .
    container_name: fl-server
    command: python app-server.py --required_clients 2 --max_rounds 2
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s = socket.socket(); s.connect(('127.0.0.1', 65432))"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - ./etc/:/app/etc/
    networks:
      - fl-network

  client_1:
    build: .
    runtime: nvidia
    depends_on:
      fl-server:
        condition: service_healthy
    command: python app-client.py --filter_bs 1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - GPU_FRACTION=0.2
    networks:
      - fl-network

  client_4:
    build: .
    runtime: nvidia
    depends_on:
      fl-server:
        condition: service_healthy
    command: python app-client.py --filter_bs 4
    networks:
      - fl-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - GPU_FRACTION=0.2

networks:
  fl-network: # Nome corrigido para bater com os serviços
    driver: bridge