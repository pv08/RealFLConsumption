services:
  fl-server:
    build: .
    container_name: fl-server
    command: python app-server.py --required_clients 2 --max_rounds 2
    volumes:
      - ./etc/:/app/etc/
    ports:
      - "65432:65432"
    networks:
      - fl-network

  client_1:
    build: .
    runtime: nvidia
    depends_on:
      - fl-server
    command: python app-client.py --filter_bs 1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - GPU_FRACTION=0.2
    networks:
      - fl-network

  client_4:
    build: .
    runtime: nvidia
    depends_on:
      - fl-server
    command: python app-client.py --filter_bs 4
    networks:
      - fl-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - GPU_FRACTION=0.2

networks:
  fl-network: # Nome corrigido para bater com os serviços
    driver: bridge