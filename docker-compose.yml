      fl_server:
        condition: service_healthy
    restart: on-failure
    environment:
      - GPU_FRACTION=0.2    # Reserva 20% da VRAM
      - CLIENT_ID=0      # Dado "privado" do cliente 1
      - LOCAL_DATA=10
    volumes:
      - ./dataset/ufjf-meters/trafos/train/:/app/data
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    networks:
      - fl_network
    command: python app-client.py --filter_bs=3

  # Cliente 3
  client_4:
    build: .
    # runtime: nvidia
    depends_on:
      fl_server:
