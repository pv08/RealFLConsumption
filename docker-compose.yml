services:
  # O Servidor Central
  fl_server:
    build: .
    container_name: fl_server
    command: python app-server.py
    healthcheck:
      test: [ "CMD", "timeout", "1", "bash", "-c", "</dev/tcp/127.0.0.1/65432" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fl_network

  # Cliente 0
  client_0:
    build: .
    # runtime: nvidia
    depends_on:
      fl_server:
        condition: service_healthy
    restart: on-failure
    environment:
      - GPU_FRACTION=0.2    # Reserva 20% da VRAM
      - CLIENT_ID=0      # Dado "privado" do cliente 1
      - LOCAL_DATA=10
    volumes:
      - ./dataset/ufjf-meters/trafos/train/:/app/data
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    networks:
      - fl_network
    command: python app-client.py --filter_bs=0

  # Cliente 0
  client_1:
    build: .
    # runtime: nvidia
    depends_on:
      fl_server:
        condition: service_healthy
    restart: on-failure
    environment:
      - GPU_FRACTION=0.2    # Reserva 20% da VRAM
      - CLIENT_ID=0      # Dado "privado" do cliente 1
      - LOCAL_DATA=10
    volumes:
      - ./dataset/ufjf-meters/trafos/train/:/app/data
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    networks:
      - fl_network
    command: python app-client.py --filter_bs=1


  # Cliente 2
  client_2:
    build: .
    # runtime: nvidia
    depends_on:
      fl_server:
        condition: service_healthy
    restart: on-failure
    environment:
      - GPU_FRACTION=0.2    # Reserva 20% da VRAM
      - CLIENT_ID=0      # Dado "privado" do cliente 1
      - LOCAL_DATA=10
    volumes:
      - ./dataset/ufjf-meters/trafos/train/:/app/data
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    networks:
      - fl_network
    command: python app-client.py --filter_bs=2


  # Cliente 3
  client_3:
    build: .
    # runtime: nvidia
