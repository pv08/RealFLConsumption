services:
  fl-server:
    build: .
    container_name: fl-server
    command: python app-server.py --host 0.0.0.0 --clients_per_round 3 --required_clients 6 --max_rounds 10
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    ports:
      - "65432:65432"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s = socket.socket(); s.connect(('0.0.0.0', 65432))"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True # Alocação dinâmica
    shm_size: '1gb'
    volumes:
      - ./etc/:/app/etc/
    networks:
      - fl-network


  client_661:
    build: .
    runtime: nvidia
    depends_on:
      fl-server:
        condition: service_healthy
    command: python app-client.py --host fl-server --filter_bs 661 --epochs 200 --batch_size 16 --num_workers 0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - GPU_FRACTION=0.1
      - CUBLAS_WORKSPACE_CONFIG=:4096:8
      - PYTORCH_ALLOC_CONF=expandable_segments:True
    shm_size: '1gb'
    networks:
      - fl-network


